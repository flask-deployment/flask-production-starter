# Nginx reverse proxy for the systemd + Gunicorn setup.
# Copy to /etc/nginx/sites-available/flaskapp, symlink into sites-enabled,
# then: sudo nginx -t && sudo systemctl reload nginx
# Guides:
#   https://flask-deployment.com/deploy/deploy-flask-with-nginx-plus-gunicorn-step-by-step-guide
#   https://flask-deployment.com/deploy/how-to-set-up-https-for-flask-nginx-plus-lets-encrypt
server {
    listen 80;
    server_name example.com www.example.com;

    client_max_body_size 16M;

    # Serve static files directly from Nginx, not Flask.
    # https://flask-deployment.com/deploy/flask-static-and-media-files-production-setup
    location /static/ {
        alias /var/www/flaskapp/static/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
