# Nginx config for the Docker Compose stack: proxies to the `web` service.
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose.yml.
# Guide: https://flask-deployment.com/deploy/flask-plus-docker-compose-production-setup
server {
    listen 80;
    server_name _;

    client_max_body_size 16M;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
